<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Proof · Sandbox</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Inter', sans-serif;
}
:root {
--amber-950: #0a0502;
--amber-900: #170c06;
--amber-800: #29150a;
--amber-700: #3d2110;
--amber-600: #5c3218;
--amber-500: #854823;
--amber-400: #ab5e2e;
--amber-300: #d17834;
--amber-200: #e69655;
--amber-100: #f0b584;
--amber-50: #f7d4b7;
--accent: #ab5e2e;
--accent-glow: rgba(171, 94, 46, 0.4);
--glass-bg: rgba(23, 12, 6, 0.85);
--glass-border: rgba(171, 94, 46, 0.3);
--shadow: 0 12px 40px rgba(10, 5, 2, 0.9);
--text-light: #f7d4b7;
--danger: #ff7a5c;
--transition-speed: 0.2s;
}
body.performance-mode {
--transition-speed: 0s;
}
body.performance-mode * {
transition: none !important;
animation: none !important;
}
::selection {
background: var(--amber-600);
color: var(--amber-50);
}
body {
background: var(--amber-950);
color: var(--text-light);
height: 100vh;
display: flex;
overflow: hidden;
}
::-webkit-scrollbar { width: 12px; height: 12px; }
::-webkit-scrollbar-track { background: var(--amber-950); }
::-webkit-scrollbar-thumb { background: var(--amber-700); border-radius: 20px; border: 3px solid var(--amber-950); }
::-webkit-scrollbar-thumb:hover { background: var(--amber-500); }
.activity-bar {
width: 72px;
background: var(--amber-900);
border-right: 1px solid var(--amber-800);
display: flex;
flex-direction: column;
align-items: center;
padding-top: 28px;
box-shadow: 4px 0 20px rgba(10, 5, 2, 0.8);
z-index: 30;
transition: width var(--transition-speed);
white-space: nowrap;
}
.activity-bar.hidden { width: 0; overflow: hidden; padding: 0; }
.activity-icon {
width: 34px;
height: 34px;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 30px;
cursor: pointer;
transition: transform var(--transition-speed), opacity var(--transition-speed), color var(--transition-speed);
opacity: 0.7;
color: var(--amber-400);
font-size: 28px;
}
.activity-icon.fa-icon:hover { opacity: 1; color: var(--amber-200); transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 4px 10px var(--accent-glow)); }
.sidebar {
width: 300px;
background: var(--amber-900);
border-right: 1px solid var(--amber-800);
display: flex;
flex-direction: column;
box-shadow: 2px 0 25px rgba(10, 5, 2, 0.7);
z-index: 20;
transition: width var(--transition-speed);
white-space: nowrap;
}
.sidebar.hidden { width: 0; overflow: hidden; padding: 0; }
.project-header { padding: 24px 20px; border-bottom: 1px solid var(--amber-800); }
.project-name {
background: var(--amber-950);
border: 1px solid var(--amber-700);
color: var(--amber-100);
font-size: 16px;
font-weight: 600;
width: 100%;
padding: 14px 20px;
outline: none;
border-radius: 16px;
transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
text-align: center;
}
.project-name:focus { border-color: var(--amber-400); box-shadow: 0 0 20px var(--accent-glow); }
.sidebar-title {
padding: 24px 20px 12px;
color: var(--amber-400);
font-size: 12px;
font-weight: 700;
letter-spacing: 1.5px;
display: flex;
justify-content: space-between;
align-items: center;
text-transform: uppercase;
}
.add-file-btn {
width: 32px; height: 32px;
display: flex; align-items: center; justify-content: center;
border-radius: 10px;
background: var(--amber-800);
border: 1px solid var(--amber-600);
color: var(--amber-200);
cursor: pointer;
transition: background var(--transition-speed), color var(--transition-speed), transform var(--transition-speed);
}
.add-file-btn:hover { background: var(--amber-500); color: var(--amber-950); border-color: var(--amber-400); transform: scale(1.05); }
.file-list { list-style: none; flex: 1; overflow-y: auto; padding: 0 12px; }
.file-item {
padding: 12px 16px; margin: 4px 0; border-radius: 12px;
display: flex; align-items: center; justify-content: space-between;
cursor: pointer; transition: background var(--transition-speed), color var(--transition-speed);
font-size: 14px;
color: var(--amber-200);
}
.file-item:hover { background: var(--amber-800); color: var(--amber-50); }
.file-item.active { background: var(--amber-700); color: var(--amber-50); font-weight: 600; border-left: 4px solid var(--amber-400); }
.file-left { display: flex; align-items: center; gap: 12px; width: 100%; }
.file-left i { width: 20px; text-align: center; }
.delete-btn {
opacity: 0; background: none; border: none; color: var(--danger); font-size: 18px;
cursor: pointer; width: 28px; height: 28px; border-radius: 8px;
display: flex; align-items: center; justify-content: center;
transition: opacity var(--transition-speed), background var(--transition-speed);
}
.delete-btn:hover { background: rgba(255,122,92,0.15); }
.file-item:hover .delete-btn { opacity: 1; }
.import-export {
display: flex; gap: 10px; padding: 20px; border-top: 1px solid var(--amber-800);
}
.import-export button {
flex: 1; background: var(--amber-800); border: 1px solid var(--amber-600);
color: var(--amber-200); padding: 12px 0; border-radius: 12px; cursor: pointer;
font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px;
transition: background var(--transition-speed), color var(--transition-speed), box-shadow var(--transition-speed);
}
.import-export button:hover { background: var(--amber-600); color: var(--amber-50); box-shadow: 0 4px 15px var(--accent-glow); }
.credit {
text-align: center;
padding: 16px 20px;
font-size: 13px;
color: var(--amber-500);
border-top: 1px solid var(--amber-800);
background: var(--amber-950);
letter-spacing: 0.5px;
}
.credit i { color: var(--amber-400); margin: 0 4px; }
.credit .version {
color: var(--amber-300);
font-family: 'Fira Code', monospace;
margin-left: 8px;
}
.workspace {
flex: 1; display: flex; overflow: hidden;
background: var(--amber-950);
}
.editor-section {
flex: 1 1 0; display: flex; flex-direction: column; min-width: 200px;
border: 1px solid var(--amber-800); position: relative;
background: var(--amber-950);
}
.splitter {
width: 8px;
background: var(--amber-800);
cursor: col-resize;
transition: background var(--transition-speed);
user-select: none;
z-index: 10;
}
.splitter:hover, .splitter.dragging { background: var(--amber-500); }
.preview-section {
flex: 1 1 0; display: flex; flex-direction: column; min-width: 200px;
background: var(--amber-50); position: relative;
border: 1px solid var(--amber-800);
}
.preview-section.hidden { display: none; }
.splitter.hidden { display: none; }
.tabs {
display: flex; background: var(--amber-900); height: 48px; overflow-x: auto;
border-bottom: 1px solid var(--amber-800);
flex-shrink: 0;
align-items: center;
}
.tab {
padding: 0 16px; display: flex; align-items: center; background: transparent;
color: var(--amber-300); border-right: 1px solid var(--amber-800); font-size: 13px; font-weight: 500;
cursor: pointer; white-space: nowrap; gap: 8px; transition: background var(--transition-speed), color var(--transition-speed);
height: 100%;
}
.tab:hover { background: var(--amber-800); color: var(--amber-100); }
.tab.active { background: var(--amber-950); color: var(--amber-50); border-top: 3px solid var(--amber-400); }
.tab .close-tab {
margin-left: 8px; opacity: 0.5; font-size: 14px; color: var(--danger);
transition: opacity var(--transition-speed);
}
.tab .close-tab:hover { opacity: 1; }
.editor-container {
flex: 1;
display: flex;
overflow: hidden;
position: relative;
background: var(--amber-950);
}
.line-numbers {
width: 50px;
background: var(--amber-900);
color: var(--amber-600);
text-align: right;
padding: 24px 12px 24px 4px;
font-family: 'Fira Code', monospace;
font-size: 15px;
line-height: 1.6;
overflow: hidden;
user-select: none;
border-right: 1px solid var(--amber-800);
flex-shrink: 0;
}
.code-area {
flex: 1; background: var(--amber-950); color: var(--amber-100);
font-family: 'Fira Code', monospace; font-size: 15px; line-height: 1.6;
padding: 24px; border: none; resize: none; outline: none; tab-size: 4;
white-space: pre; overflow: auto; caret-color: var(--amber-400);
}
.settings-panel, .shortcuts-panel {
flex: 1; background: var(--amber-950); padding: 24px; overflow-y: auto;
color: var(--amber-100); display: none;
}
.settings-panel.active, .shortcuts-panel.active { display: block; }
.settings-group { margin-bottom: 28px; }
.settings-group label { display: block; margin-bottom: 12px; color: var(--amber-300); font-weight: 600; font-size: 14px; letter-spacing: 0.5px; }
.settings-group input[type="text"], .settings-group input[type="number"], .settings-group select {
width: 100%; background: var(--amber-950); border: 1px solid var(--amber-600);
color: var(--amber-50); padding: 10px 16px; border-radius: 8px; outline: none; font-size: 14px;
transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
}
.settings-group input:focus, .settings-group select:focus { border-color: var(--amber-400); box-shadow: 0 0 10px var(--accent-glow); }
.settings-group .checkbox-label {
display: flex; align-items: center; gap: 12px; cursor: pointer;
}
.settings-group input[type="checkbox"] {
width: 18px; height: 18px; accent-color: var(--amber-500);
}
.settings-actions { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
.settings-actions button {
padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: background var(--transition-speed), box-shadow var(--transition-speed);
font-size: 14px;
background: var(--amber-500); color: var(--amber-950);
}
.settings-actions button:hover { background: var(--amber-400); box-shadow: 0 4px 15px var(--accent-glow); }
.settings-actions button.reset {
background: var(--amber-800);
color: var(--amber-200);
border: 1px solid var(--amber-600);
}
.settings-actions button.reset:hover { background: var(--amber-700); color: var(--amber-50); }
.shortcut-list { list-style: none; margin-bottom: 28px; max-height: 400px; overflow-y: auto; padding-right: 10px; }
.shortcut-list li {
display: flex; justify-content: space-between; align-items: center; padding: 12px 0;
border-bottom: 1px solid var(--amber-800); color: var(--amber-100);
}
.shortcut-list .key {
color: var(--amber-950); font-family: 'Fira Code', monospace; background: var(--amber-400); font-weight: 600;
padding: 6px 12px; border-radius: 8px; font-size: 12px;
}
.find-overlay {
position: absolute; top: 60px; right: 24px;
background: var(--glass-bg); backdrop-filter: blur(16px);
border: 1px solid var(--glass-border); border-radius: 16px; padding: 12px 16px;
display: none; align-items: center; gap: 12px; z-index: 50; box-shadow: var(--shadow);
}
.find-overlay input {
background: var(--amber-950); border: 1px solid var(--amber-600); color: var(--amber-50);
padding: 10px 16px; border-radius: 8px; width: 220px; outline: none; font-size: 14px;
transition: border-color var(--transition-speed);
}
.find-overlay input:focus { border-color: var(--amber-400); box-shadow: 0 0 10px var(--accent-glow); }
.find-overlay button {
background: var(--amber-800); border: 1px solid var(--amber-600); color: var(--amber-200); font-size: 14px;
cursor: pointer; width: 32px; height: 32px; border-radius: 8px;
display: flex; align-items: center; justify-content: center; transition: background var(--transition-speed), color var(--transition-speed);
}
.find-overlay button:hover { background: var(--amber-500); color: var(--amber-50); }
.find-count { color: var(--amber-300); font-size: 13px; font-weight: 600; min-width: 45px; text-align: center; }
.preview-header {
background: var(--amber-900); height: 48px; padding: 0 20px;
display: flex; align-items: center; justify-content: space-between;
border-bottom: 1px solid var(--amber-800); color: var(--amber-200); font-size: 13px; font-weight: 600;
letter-spacing: 1px;
flex-shrink: 0;
}
.preview-controls { display: flex; gap: 10px; align-items: center; }
.preview-controls select {
background: var(--amber-950);
border: 1px solid var(--amber-600);
color: var(--amber-100);
padding: 6px 30px 6px 14px;
border-radius: 8px;
font-size: 13px;
outline: none;
cursor: pointer;
transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
-webkit-appearance: none;
appearance: none;
background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23ab5e2e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
background-repeat: no-repeat;
background-position: right 8px center;
background-size: 16px;
}
.preview-controls select:focus { border-color: var(--amber-400); box-shadow: 0 0 10px var(--accent-glow); }
.preview-controls button {
background: var(--amber-800); border: 1px solid var(--amber-600); color: var(--amber-200); font-size: 14px;
cursor: pointer; width: 32px; height: 32px; border-radius: 8px;
display: flex; align-items: center; justify-content: center; transition: background var(--transition-speed), color var(--transition-speed);
}
.preview-controls button:hover { background: var(--amber-500); color: var(--amber-50); }
iframe { width: 100%; flex: 1; border: none; background: var(--amber-50); min-height: 0; }
.console-panel {
background: var(--amber-950); border-top: 2px solid var(--amber-600);
height: 220px; display: flex; flex-direction: column; transition: height var(--transition-speed);
flex-shrink: 0;
}
.console-header {
height: 38px; display: flex; align-items: center; justify-content: space-between;
padding: 0 20px; background: var(--amber-900); border-bottom: 1px solid var(--amber-800);
font-size: 12px; font-weight: 700; color: var(--amber-400); letter-spacing: 1px;
}
.console-actions button {
background: transparent; border: none; color: var(--amber-400); margin-left: 12px; cursor: pointer; font-size: 14px; transition: color var(--transition-speed), transform var(--transition-speed);
}
.console-actions button:hover { color: var(--amber-100); transform: scale(1.1); }
.console-logs {
flex: 1; overflow-y: auto; padding: 12px 16px; font-family: 'Fira Code', monospace;
font-size: 13px; background: rgba(23, 12, 6, 0.4); color: var(--amber-100);
}
.log-item { padding: 6px 0; border-bottom: 1px solid var(--amber-900); display: flex; gap: 12px; }
.log-item.error { color: #ff7a5c; }
.log-item.warn { color: #f0b584; }
.log-item.info { color: #a1d1f7; }
.log-item .log-icon { width: 24px; opacity: 0.8; }
.modal-overlay {
display: none; position: fixed; top:0; left:0; width:100%; height:100%;
background: rgba(10, 5, 2, 0.85); backdrop-filter: blur(8px);
align-items: center; justify-content: center; z-index: 200;
}
.modal {
background: var(--amber-900); border: 1px solid var(--amber-600);
border-radius: 24px; padding: 36px; width: 480px; max-width: 90%;
box-shadow: var(--shadow); color: var(--amber-50);
}
.modal h3 { margin-bottom: 24px; font-size: 20px; font-weight: 600; color: var(--amber-300); display: flex; align-items: center; gap: 8px; }
.modal-input {
width: 100%; background: var(--amber-950); border: 1px solid var(--amber-600);
color: var(--amber-50); padding: 14px 20px; border-radius: 12px; margin-bottom: 24px; outline: none; font-size: 15px;
transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
}
.modal-input:focus { border-color: var(--amber-400); box-shadow: 0 0 15px var(--accent-glow); }
.modal select {
background: var(--amber-950);
border: 1px solid var(--amber-600);
color: var(--amber-100);
padding: 6px 30px 6px 14px;
border-radius: 8px;
font-size: 13px;
outline: none;
cursor: pointer;
transition: border-color var(--transition-speed);
-webkit-appearance: none;
appearance: none;
background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23ab5e2e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
background-repeat: no-repeat;
background-position: right 8px center;
background-size: 16px;
}
.modal select:focus { border-color: var(--amber-400); box-shadow: 0 0 10px var(--accent-glow); }
.modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
.modal-actions button {
padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; transition: background var(--transition-speed), box-shadow var(--transition-speed);
font-size: 14px;
}
.modal-actions .cancel { background: transparent; border: 1px solid var(--amber-600); color: var(--amber-200); }
.modal-actions .cancel:hover { background: var(--amber-800); }
.modal-actions .confirm, .modal-actions .create { background: var(--amber-500); color: var(--amber-950); }
.modal-actions .confirm:hover, .modal-actions .create:hover { background: var(--amber-400); box-shadow: 0 4px 15px var(--accent-glow); }
.preset-grid {
display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px;
}
.preset-btn {
background: var(--amber-800); border: 1px solid var(--amber-600); color: var(--amber-200);
padding: 16px 10px; border-radius: 12px; cursor: pointer; text-align: center; transition: transform var(--transition-speed), border-color var(--transition-speed), background var(--transition-speed);
font-weight: 500;
}
.preset-btn:hover { border-color: var(--amber-400); background: var(--amber-700); color: var(--amber-50); transform: translateY(-2px); }
.custom-checkbox {
display: flex;
align-items: center;
gap: 8px;
cursor: pointer;
color: var(--amber-200);
font-size: 13px;
}
.custom-checkbox input[type="checkbox"] {
appearance: none;
-webkit-appearance: none;
width: 18px;
height: 18px;
background: var(--amber-950);
border: 2px solid var(--amber-600);
border-radius: 4px;
outline: none;
cursor: pointer;
transition: background var(--transition-speed), border-color var(--transition-speed);
position: relative;
}
.custom-checkbox input[type="checkbox"]:checked {
background: var(--amber-500);
border-color: var(--amber-400);
}
.custom-checkbox input[type="checkbox"]:checked::after {
content: "✓";
position: absolute;
color: var(--amber-950);
font-size: 14px;
font-weight: bold;
left: 2px;
top: -2px;
}
.custom-checkbox input[type="checkbox"]:focus {
box-shadow: 0 0 10px var(--accent-glow);
}
</style>
</head>
<body>
<div class="activity-bar" id="activityBar">
<i class="fas fa-file-code activity-icon fa-icon" onclick="switchToFile('index.html')" title="Home (index.html)"></i>
<i class="fas fa-cog activity-icon fa-icon" onclick="openSettingsTab()" title="Settings"></i>
<i class="fas fa-keyboard activity-icon fa-icon" onclick="openShortcutsTab()" title="Shortcuts"></i>
</div>
<div class="sidebar" id="sidebar">
<div class="project-header">
<input type="text" class="project-name" value="Visual Proof" spellcheck="false" id="projectNameInput">
</div>
<div class="sidebar-title">
<span><i class="fas fa-crown" style="margin-right:8px; color:var(--amber-400);"></i>FILES</span>
<span class="add-file-btn" onclick="showCreateFileModal()" title="New File"><i class="fas fa-plus"></i></span>
</div>
<ul class="file-list" id="fileList"></ul>
<div class="import-export">
<button onclick="document.getElementById('zipInput').click()"><i class="fas fa-file-import"></i> IMPORT</button>
<button onclick="exportProject()"><i class="fas fa-file-export"></i> EXPORT</button>
<input type="file" id="zipInput" accept=".zip" style="display:none;" onchange="importZip(event)">
</div>
<div class="credit">
made with <i class="fas fa-heart"></i> by <strong>Chip Hill</strong> <span class="version">v1.1</span>
</div>
</div>
<div class="workspace layout-row" id="workspace">
<div class="editor-section" id="editorSection">
<div class="tabs" id="tabsArea"></div>
<div class="editor-container">
<div class="line-numbers" id="lineNumbers"></div>
<textarea id="codeEditor" class="code-area" spellcheck="false" wrap="off"></textarea>
<div class="settings-panel" id="settingsPanel">
<h3 style="color:var(--amber-300); margin-bottom:24px;"><i class="fas fa-cog"></i> Settings</h3>
<div class="settings-group" id="hotkeySettings"></div>
<div class="settings-group">
<label>Editor</label>
<div style="margin-bottom:12px;">
<label class="custom-checkbox" style="margin-bottom:8px;">
<input type="checkbox" id="livePreviewCheckbox"> Live Preview (auto-update)
</label>
</div>
<div style="display:flex; gap:12px; margin-bottom:12px;">
<div style="flex:1;">
<label style="font-size:12px; color:var(--amber-300);">Font Size</label>
<input type="number" id="fontSizeInput" min="10" max="30" step="1" value="15">
</div>
<div style="flex:1;">
<label style="font-size:12px; color:var(--amber-300);">Tab Size</label>
<select id="tabSizeSelect">
<option value="2">2 spaces</option>
<option value="4" selected>4 spaces</option>
</select>
</div>
</div>
<div style="margin-bottom:12px;">
<label class="custom-checkbox">
<input type="checkbox" id="wordWrapCheckbox"> Word Wrap
</label>
</div>
<div style="margin-bottom:12px;">
<label class="custom-checkbox">
<input type="checkbox" id="showLineNumbersCheckbox" checked> Show Line Numbers
</label>
</div>
</div>
<div class="settings-group">
<label>Performance Mode</label>
<label class="custom-checkbox">
<input type="checkbox" id="performanceModeCheckbox"> Disable animations & transitions
</label>
</div>
<div class="settings-actions">
<button onclick="saveSettingsFromPanel()">Save Settings</button>
<button class="reset" onclick="resetHotkeys()">Reset Shortcuts</button>
</div>
</div>

function getCompiledCode() {
if(files[currentFile] && !settingsMode && !shortcutsMode) files[currentFile].content = codeEditor.value;

let htmlContent = files[htmlFile].content;
if (standaloneMode) {
return htmlContent;
} else {
let css = '', js = '';
for (let f in files) {
if (f.endsWith('.css')) css += files[f].content + '\n';
if (f.endsWith('.js')) js += files[f].content + '\n';
}
let styleTag = css ? `<style>${css}</style>` : '';
let scriptTag = js ? `<script>${js}<\/script>` : '';
if (htmlContent.includes('</head>')) {
htmlContent = htmlContent.replace('</head>', styleTag + '</head>');
} else {
htmlContent = styleTag + htmlContent;
}
if (htmlContent.includes('</body>')) {

} else {
htmlContent += scriptTag;
}
return htmlContent;
}

function hideShortcutsModal() { shortcutsModal.style.display='none'; }
async function importZip(e) {
let file=e.target.files[0]; if(!file)return;
try{ let zip=new JSZip(); let contents=await zip.loadAsync(file); let newFiles={}; let promises=[];
contents.forEach((path,entry)=>{ if(!entry.dir) promises.push(entry.async('string').then(c=>{ let name=path.split('/').pop(); if(name) newFiles[name]={icon:getFileIconClass(name),content:c}; })); });
await Promise.all(promises);
if(Object.keys(newFiles).length) showConfirmDialog('Replace current environment?',()=>{ files=newFiles; openedFiles = Object.keys(newFiles).filter(f=>f.endsWith('.html')||f.endsWith('.css')||f.endsWith('.js')); if (openedFiles.length === 0) openedFiles = Object.keys(newFiles); currentFile=openedFiles[0]||Object.keys(newFiles)[0]; codeEditor.value=files[currentFile]?.content||''; previewHtmlFile=Object.keys(newFiles).find(f=>f.endsWith('.html'))||null; if (settingsMode||shortcutsMode) exitSpecialModes(); renderSidebarAndTabs(); updateLineNumbers(); updatePreviewHtmlSelect(); updatePreview(); });
e.target.value='';
} catch{ alert('Import failed.'); }
}
function exportProject() { 
if(files[currentFile] && !settingsMode && !shortcutsMode) files[currentFile].content=codeEditor.value; 
let zip=new JSZip(); 
for(let [n,d] of Object.entries(files)) zip.file(n,d.content); 
let projectName = projectNameInput.value.trim() || 'visual_proof';
zip.generateAsync({type:'blob'}).then(b=>saveAs(b, projectName + '.zip')); 
}
function captureConsole() {
let win=previewFrame.contentWindow; if(!win)return;
let oldLog=win.console.log, oldWarn=win.console.warn, oldError=win.console.error, oldInfo=win.console.info;
win.console.log=function(...a){ addLog('log',...a); oldLog.apply(win.console,a); };
win.console.warn=function(...a){ addLog('warn',...a); oldWarn.apply(win.console,a); };
win.console.error=function(...a){ addLog('error',...a); oldError.apply(win.console,a); };
win.console.info=function(...a){ addLog('info',...a); oldInfo.apply(win.console,a); };
win.addEventListener('error', (e) => addLog('error', e.message));
}
function addLog(t,...a) { let el=document.createElement('div'); el.className=`log-item ${t}`; let icon={log:'📋',warn:'⚠️',error:'❌',info:'ℹ️'}[t]||'📄'; let msg = a.map(x => { try { return typeof x === 'string' ? x : JSON.stringify(x); } catch { return String(x); } }).join(' '); el.innerHTML=`<span class="log-icon">${icon}</span><span>${msg}</span>`; consoleLogs.appendChild(el); consoleLogs.scrollTop=consoleLogs.scrollHeight; }
function clearConsole() { consoleLogs.innerHTML=''; }
function toggleConsole() { let p=document.getElementById('consolePanel'); consoleVisible=!consoleVisible; p.style.height=consoleVisible?'220px':'38px'; }
previewFrame.addEventListener('load',captureConsole);
function duplicateLine() {
let start = codeEditor.selectionStart;
let val = codeEditor.value;
let lineStart = val.lastIndexOf('\n', start-1) + 1;
let lineEnd = val.indexOf('\n', start);
if (lineEnd === -1) lineEnd = val.length;
let line = val.substring(lineStart, lineEnd);
codeEditor.value = val.substring(0, lineEnd) + '\n' + line + val.substring(lineEnd);
codeEditor.selectionStart = lineEnd + 1;
codeEditor.selectionEnd = lineEnd + 1;
files[currentFile].content = codeEditor.value;
updateLineNumbers();
updatePreview();
}
function toggleComment() {
let start = codeEditor.selectionStart;
let val = codeEditor.value;
let lineStart = val.lastIndexOf('\n', start-1) + 1;
let lineEnd = val.indexOf('\n', start);
if (lineEnd === -1) lineEnd = val.length;
let line = val.substring(lineStart, lineEnd);
if (line.trim().startsWith('//')) {
line = line.replace('//', '');
} else {
line = '//' + line;
}
codeEditor.value = val.substring(0, lineStart) + line + val.substring(lineEnd);
codeEditor.selectionStart = lineStart;
codeEditor.selectionEnd = lineStart + line.length;
files[currentFile].content = codeEditor.value;
updateLineNumbers();
updatePreview();
}
function checkHotkey(e, shortcutString) {
if (!shortcutString) return false;
let keys = shortcutString.toLowerCase().split('+').map(s => s.trim());
let needsCtrl = keys.includes('ctrl') || keys.includes('cmd');
let needsShift = keys.includes('shift');
let needsAlt = keys.includes('alt');
let key = keys[keys.length - 1];
if (key === 'space') key = ' ';
if (key === '~' || key === '`') key = '`';
return (!!e.ctrlKey === needsCtrl) && (!!e.shiftKey === needsShift) && (!!e.altKey === needsAlt) && (e.key.toLowerCase() === key || e.code.toLowerCase().endsWith(key));
}
applyEditorSettings();
codeEditor.value=files[currentFile].content; renderSidebarAndTabs(); updateLineNumbers(); updatePreviewHtmlSelect(); updatePreview();
let timeout; codeEditor.addEventListener('input',()=>{
if(!settingsMode && !shortcutsMode) {
updateLineNumbers();
if (editorSettings.livePreview) {
clearTimeout(timeout);
timeout=setTimeout(updatePreview,400);
}
}
});
codeEditor.addEventListener('keydown', e => {
if (e.ctrlKey && e.key === 'z') return;
if (e.ctrlKey && e.key === 'y') return;
if(settingsMode || shortcutsMode) return;
if(e.key==='Tab' && !e.ctrlKey && !e.shiftKey && document.activeElement === codeEditor){ e.preventDefault(); let s=codeEditor.selectionStart; codeEditor.value=codeEditor.value.substring(0,s)+'  '+codeEditor.value.substring(codeEditor.selectionEnd); codeEditor.selectionStart=codeEditor.selectionEnd=s+2; files[currentFile].content=codeEditor.value; updateLineNumbers(); updatePreview(); return; }
const pairs = { '(': ')', '{': '}', '[': ']', '"': '"', "'": "'" };
if (pairs[e.key] && document.activeElement === codeEditor) {
let s = codeEditor.selectionStart, end = codeEditor.selectionEnd;
if (s !== end) { e.preventDefault(); let val = codeEditor.value; codeEditor.value = val.substring(0,s) + e.key + val.substring(s,end) + pairs[e.key] + val.substring(end); codeEditor.selectionStart = s+1; codeEditor.selectionEnd = end+1; files[currentFile].content = codeEditor.value; updateLineNumbers(); updatePreview(); } 
else { e.preventDefault(); let val = codeEditor.value; codeEditor.value = val.substring(0,s) + e.key + pairs[e.key] + val.substring(end); codeEditor.selectionStart = codeEditor.selectionEnd = s+1; files[currentFile].content = codeEditor.value; updatePreview(); }
}
if (checkHotkey(e, hotkeys.save.current)) { e.preventDefault(); updatePreview(); }
if (checkHotkey(e, hotkeys.find.current)) { e.preventDefault(); showFind(); }
if (checkHotkey(e, hotkeys.newFile.current)) { e.preventDefault(); showCreateFileModal(); }
if (checkHotkey(e, hotkeys.togglePreview.current)) { e.preventDefault(); togglePreview(); }
if (checkHotkey(e, hotkeys.clearConsole.current)) { e.preventDefault(); clearConsole(); }
if (checkHotkey(e, hotkeys.toggleConsole.current)) { e.preventDefault(); toggleConsole(); }
if (checkHotkey(e, hotkeys.shortcuts.current)) { e.preventDefault(); showShortcutsModal(); }
if (checkHotkey(e, hotkeys.swapPanels.current)) { e.preventDefault(); swapPanels(); }
if (checkHotkey(e, hotkeys.nextTab.current)) { e.preventDefault(); cycleTab(1); }
if (checkHotkey(e, hotkeys.prevTab.current)) { e.preventDefault(); cycleTab(-1); }
if (checkHotkey(e, hotkeys.closeTab.current)) { e.preventDefault(); if (!settingsMode && !shortcutsMode && openedFiles.length > 1) closeTab(currentFile, new Event('click')); }
if (checkHotkey(e, hotkeys.toggleSidebar.current)) { e.preventDefault(); toggleSidebar(); }
if (checkHotkey(e, hotkeys.duplicateLine.current)) { e.preventDefault(); duplicateLine(); }
if (checkHotkey(e, hotkeys.toggleComment.current)) { e.preventDefault(); toggleComment(); }
});
function cycleTab(direction) {
if (settingsMode || shortcutsMode) return;
let idx = openedFiles.indexOf(currentFile);
let newIdx = (idx + direction + openedFiles.length) % openedFiles.length;
switchToFile(openedFiles[newIdx]);
}
fileModal.addEventListener('click',e=>{ if(e.target===fileModal) hideModal('fileModal'); });
shortcutsModal.addEventListener('click',e=>{ if(e.target===shortcutsModal) hideShortcutsModal(); });
let isDragging = false; let startX = 0;
splitter.addEventListener('mousedown', (e) => { 
e.preventDefault(); 
isDragging = true; 
startX = e.clientX; 
const editorWidth = editorSection.getBoundingClientRect().width; 
const total = workspace.clientWidth - (splitter.clientWidth || 8);
editorRatio = editorWidth / total;
splitter.classList.add('dragging'); 
document.body.style.cursor = 'col-resize'; 
});
window.addEventListener('mousemove', (e) => { 
if (!isDragging) return; 
e.preventDefault(); 
const dx = e.clientX - startX; 
const total = workspace.clientWidth - (splitter.clientWidth || 8);
const newEditorWidth = total * editorRatio + dx;
const newPreviewWidth = total - newEditorWidth;
if (newEditorWidth > 200 && newPreviewWidth > 200) { 
editorSection.style.flex = '0 0 ' + newEditorWidth + 'px'; 
previewSection.style.flex = '0 0 ' + newPreviewWidth + 'px'; 
} 
});
window.addEventListener('mouseup', () => { 
if (isDragging) { 
isDragging = false; 
splitter.classList.remove('dragging'); 
document.body.style.cursor = ''; 
const editorWidth = editorSection.getBoundingClientRect().width; 
const total = workspace.clientWidth - (splitter.clientWidth || 8);
editorRatio = editorWidth / total;
} 
});
